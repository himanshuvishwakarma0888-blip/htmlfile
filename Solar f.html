<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> document </title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:white;
    overflow:hidden;
}

.container{
    width:100%;
    height:100vh;
    position:relative;
}

.sidebar{
    position:absolute;
    left:30px;
    top:50%;
    transform:translateY(-50%);
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    margin:15px 0;
    color:#bbb;
    cursor:pointer;
    transition:.4s;
}

.sidebar li:hover{
    color:orange;
    transform:translateX(10px);
}

.content{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

h1{
    position:absolute;
    top:30px;
    letter-spacing:8px;
    font-size:30px;
}

.planet{
    width:550px;
    height:550px;
    border-radius:50%;
    background:
    radial-gradient(circle at 30% 30%,
    #ffcf7d,
    #ff8c00,
    #3a1300,
    #000);
    
    box-shadow:
    0 0 60px orange,
    0 0 120px rgba(255,140,0,.6);

    animation:
    rotate 20s linear infinite,
    float 4s ease-in-out infinite;
}

h2{
    margin-top:30px;
    letter-spacing:12px;
    font-size:40px;
    font-weight:300;
}

p{
    width:500px;
    color:#aaa;
    margin-top:15px;
    line-height:1.6;
}

a{
    margin-top:25px;
    text-decoration:none;
    color:white;
    border:1px solid orange;
    padding:12px 30px;
    border-radius:30px;
    transition:.4s;
}

a:hover{
    background:orange;
    color:black;
}

@keyframes rotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes float{
    0%,100%{
        translate:0 0;
    }

    50%{
        translate:0 -20px;
    }
}
    </style>

<div class="container">

    <div class="sidebar">
        <ul>
            <li>☿ Mercury</li>
            <li>♀ Venus</li>
            <li>🌍 Earth</li>
            <li>♂ Mars</li>
            <li>♃ Jupiter</li>
            <li>♄ Saturn</li>
            <li>♅ Uranus</li>
            <li>♆ Neptune</li>
        </ul>
    </div>

    <div class="content">
        <h1>SPACE EXPLORER</h1>

        <div class="planet"></div>

        <h2>VENUS</h2>

        <p>
            Venus is the second planet from the Sun.
            It is the hottest planet in our solar system.
        </p>

        <a href="#">Read More</a>
    </div>

</div>

</body>
</html>
