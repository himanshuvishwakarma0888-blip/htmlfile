<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Images with Shadow Box</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #cb1414;
    margin: 0;
}


.border-container {
    display: flex;
    gap: 20px; 
    padding: 20px;
    border: 3px solid #333; 
    border-radius: 10px;
    background-color: #fff;
}

.shadow-box {
    padding: 10px;
    background-color: white;
    border-radius: 8px;
    
    box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2); 
    
    transition: transform 0.3s ease, box-shadow 0.3s ease; 
}


.shadow-box img { 
    display: block;
    width: 150px; 
    height: 150px;
    object-fit: cover;
    border-radius: 4px;
}

.shadow-box:hover {
    transform: translateY(-5px); 
    box-shadow: 0px 15px 25px rgba(0, 0, 0, 0.3); 
}
</style>
    
<body>

    <div class="border-container">
        <div class="shadow-box">
            <img src="" alt="Image 1">
        </div>
        
        <div class="shadow-box">
            <img src="" alt="Image 2">
        </div>
        
        <div class="shadow-box">
            <img src="" alt="Image 3">
        </div>
    </div>

</body>
</html>
